<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f2f4f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zoé Charge">
  <meta name="description" content="Calculateur de recharge Renault Zoé 52 kWh">
  <title>Zoé Charge</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:       #00b67a;
      --green-dim:   #007a52;
      --green-light: #e6f7f1;
      --bg:          #f2f4f7;
      --bg1:         #ffffff;
      --bg3:         #f0f2f5;
      --border:      #e0e4ec;
      --text:        #0d1117;
      --muted:       #7a8599;
      --muted2:      #a0aabb;
      --warn-bg:     #fffbf0;
      --warn-border: #f0c060;
      --warn-text:   #c47a00;
      --num:         'Bebas Neue', sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }
    body::before { display: none; }
    .app {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; margin: 0 auto;
      height: 100dvh;
      padding: env(safe-area-inset-top,20px) 14px env(safe-area-inset-bottom,10px);
      display: flex; flex-direction: column; gap: 9px;
    }

    /* Header */
    .header { display:flex; align-items:center; gap:10px; flex-shrink:0; padding:4px 0; }
    .logo-ring {
      width:36px; height:36px; border-radius:50%;
      border:2px solid var(--green); background:var(--green-light);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 0 3px #00b67a14; flex-shrink:0;
    }
    .header-text h1 { font-family:var(--num); font-size:22px; letter-spacing:.5px; color:var(--text); line-height:1; }
    .header-text p  { font-size:9px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }

    /* Cards */
    .card {
      background:var(--bg1); border:1px solid var(--border);
      border-radius:16px; padding:13px 16px;
      box-shadow:0 1px 4px #0d111710,0 4px 12px #0d111706;
      flex-shrink:0;
    }
    .card-label { font-size:9px; color:var(--muted2); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; }

    /* SOC */
    .soc-row { display:flex; align-items:center; gap:14px; }
    .soc-display { display:flex; align-items:baseline; gap:2px; flex-shrink:0; }
    .soc-num  { font-family:var(--num); font-size:86px; color:var(--text); line-height:.9; letter-spacing:1px; }
    .soc-pct  { font-family:var(--num); font-size:36px; color:var(--green); line-height:1; }

    .stepper-btns { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
    .stp {
      width:44px; height:44px; border:none; border-radius:11px;
      font-family:var(--num); font-size:28px; letter-spacing:0;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent; user-select:none; transition:transform .1s;
    }
    .stp:active { transform:scale(.90); }
    .stp-p { background:var(--green-light); color:var(--green-dim); border:1.5px solid #00b67a88; }
    .stp-m { background:var(--bg3); color:var(--text); border:none; }

    .metrics-col { display:flex; flex-direction:column; gap:8px; flex:1; min-width:0; }
    .mi-val  { font-family:var(--num); font-size:26px; color:var(--text); line-height:1; letter-spacing:.5px; }
    .mi-unit { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
    .mi-lbl  { font-size:8px; color:var(--muted2); text-transform:uppercase; letter-spacing:.07em; margin-top:1px; }

    /* Mode */
    .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .mode-tile {
      background:var(--bg3); border:1.5px solid var(--border);
      border-radius:11px; padding:10px 14px; cursor:pointer;
      transition:border-color .15s,background .15s;
      -webkit-tap-highlight-color:transparent; user-select:none;
    }
    .mode-tile:active { transform:scale(.96); }
    .mode-tile.active { border-color:var(--green); background:var(--green-light); }
    .tile-pw { font-family:var(--num); font-size:26px; letter-spacing:.5px; color:var(--text); line-height:1; }
    .mode-tile.active .tile-pw { color:var(--green-dim); }
    .tile-nm { font-size:9px; color:var(--muted); margin-top:3px; }

    /* Time */
    input[type=time] {
      background:var(--bg3); border:1.5px solid var(--border);
      border-radius:11px; padding:9px 14px;
      font-family:var(--num); font-size:42px; letter-spacing:2px;
      color:var(--text); width:100%;
      transition:border-color .15s; -webkit-appearance:none; line-height:1;
    }
    input[type=time]:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px #00b67a14; }

    /* Résultat */
    .result-card { border-radius:16px; padding:13px 16px; flex-shrink:0; transition:background .3s,border-color .3s; }
    .result-card.state-info { background:var(--bg1); border:1px solid var(--border); }
    .result-card.state-ok   { background:var(--green-light); border:1.5px solid #00b67a55; }
    .result-card.state-warn { background:var(--warn-bg); border:1.5px solid var(--warn-border); }

    .res-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .res-eyebrow { font-size:9px; text-transform:uppercase; letter-spacing:.1em; margin-bottom:2px; }
    .state-info .res-eyebrow { color:var(--muted2); }
    .state-ok   .res-eyebrow { color:var(--green-dim); }
    .state-warn .res-eyebrow { color:var(--warn-text); }

    .res-time { font-family:var(--num); font-size:68px; letter-spacing:2px; line-height:.9; transition:color .3s; }
    .state-info .res-time { color:var(--muted2); }
    .state-ok   .res-time { color:#007a52; }
    .state-warn .res-time { color:var(--warn-text); }

    .res-sub { font-size:10px; }
    .state-info .res-sub { color:var(--muted2); }
    .state-ok   .res-sub { color:var(--green-dim); }
    .state-warn .res-sub { color:var(--warn-text); }

    /* Install banner */
    #install-banner {
      display:none; align-items:center; gap:10px; flex-shrink:0;
      background:var(--green-light); border:1px solid #00b67a44;
      border-radius:12px; padding:10px 12px;
    }
    #install-banner p { font-size:11px; color:var(--text); flex:1; line-height:1.4; }
    #install-banner strong { color:var(--green-dim); display:block; font-family:var(--num); font-size:15px; letter-spacing:.3px; }
    .install-btn { background:var(--green); color:#fff; border:none; border-radius:8px; padding:7px 12px; font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; flex-shrink:0; }
  </style>
</head>
<body>
<div class="app">

  <div id="install-banner">
    <div style="width:28px;height:28px;border-radius:50%;background:var(--green-light);border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00b67a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <p><strong>Installer l'application</strong>Ajouter à l'écran d'accueil</p>
    <button class="install-btn" id="install-btn">Installer</button>
  </div>

  <div class="header">
    <div class="logo-ring">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#00b67a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div class="header-text">
      <h1>Renault Zoé</h1>
      <p>52 kWh · réel 49,4 kWh (SoH 95 %)</p>
    </div>
  </div>

  <div class="card">
    <div class="card-label">État de charge actuel</div>
    <div class="soc-row">
      <div class="soc-display">
        <div class="soc-num" id="soc-big">20</div>
        <div class="soc-pct">%</div>
      </div>
      <div class="stepper-btns">
        <button class="stp stp-p" id="soc-plus">+</button>
        <button class="stp stp-m" id="soc-minus">−</button>
      </div>
      <div class="metrics-col">
        <div>
          <div class="mi-val" id="m-kwh">14,8 <span class="mi-unit">kWh</span></div>
          <div class="mi-lbl">À recharger</div>
        </div>
        <div>
          <div class="mi-val" id="m-dur">9h09</div>
          <div class="mi-lbl">Durée estimée</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Mode de recharge</div>
    <div class="mode-grid">
      <div class="mode-tile active" onclick="setMode(this,0)">
        <div class="tile-pw">3,7 kW</div>
        <div class="tile-nm">Prise renforcée</div>
      </div>
      <div class="mode-tile" onclick="setMode(this,1)">
        <div class="tile-pw">1,8 kW</div>
        <div class="tile-nm">Prise lente</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Heure de fin souhaitée</div>
    <input type="time" id="end-time" oninput="update()">
  </div>

  <div class="result-card state-info" id="result-card">
    <div class="res-row">
      <div>
        <div class="res-eyebrow" id="res-eyebrow">En attente</div>
        <div class="res-time" id="res-time">--:--</div>
      </div>
    </div>
  </div>

</div>
<script>
  const MODES=[{power:3.7,eff:.90},{power:1.8,eff:.90}];
  let modeIdx=0;
  const BATTERY=52*.95, TARGET=80;

  function pad(n){return String(n).padStart(2,'0');}
  function fmtH(h){
    const hh=Math.floor(h),mm=Math.round((h-hh)*60);
    if(hh===0)return mm+'min';
    if(mm===0)return hh+'h00';
    return hh+'h'+pad(mm);
  }

  function setMode(el,idx){
    document.querySelectorAll('.mode-tile').forEach(t=>t.classList.remove('active'));
    el.classList.add('active'); modeIdx=idx; update();
  }

  let socVal=20;
  function socSet(v){
    socVal=Math.max(0,Math.min(79,v));
    document.getElementById('soc-big').textContent=socVal;
    update();
  }
  function makeHold(btnId,dir){
    const btn=document.getElementById(btnId);
    let timer=null,interval=null;
    const start=()=>{
      socSet(socVal+dir);
      timer=setTimeout(()=>{interval=setInterval(()=>socSet(socVal+dir*10),150);},500);
    };
    const stop=()=>{clearTimeout(timer);clearInterval(interval);};
    btn.addEventListener('mousedown',start);
    btn.addEventListener('touchstart',e=>{e.preventDefault();start();},{passive:false});
    btn.addEventListener('mouseup',stop);
    btn.addEventListener('mouseleave',stop);
    btn.addEventListener('touchend',stop);
    btn.addEventListener('touchcancel',stop);
  }
  makeHold('soc-plus',+1);
  makeHold('soc-minus',-1);

  function update(){
    const M=MODES[modeIdx];
    const soc=socVal;
    const missing=Math.max(0,TARGET-soc);
    const kwhNet=BATTERY*missing/100;
    const kwhGrid=kwhNet/M.eff;
    const hours=kwhGrid/M.power;
    const totalMins=Math.round(hours*60);

    document.getElementById('m-kwh').innerHTML=kwhNet.toFixed(1).replace('.',',')+'&thinsp;<span class="mi-unit">kWh</span>';
    document.getElementById('m-dur').textContent=missing===0?'0h00':fmtH(hours);

    const card=document.getElementById('result-card');
    const eyebrow=document.getElementById('res-eyebrow');
    const timeEl=document.getElementById('res-time');
    const sub=document.getElementById('res-sub');

    if(missing===0){
      card.className='result-card state-ok';
      eyebrow.textContent='Batterie suffisante';
      timeEl.textContent='≥ 80 %';
      sub.textContent='Aucune recharge nécessaire';
      return;
    }

    const val=document.getElementById('end-time').value;
    if(!val){
      card.className='result-card state-info';
      return;
    }

    const[h,mn]=val.split(':').map(Number);
    const em=h*60+mn;
    let sm=em-totalMins;
    const prev=sm<0;
    sm=((sm%(24*60))+(24*60))%(24*60);
    const startStr=pad(Math.floor(sm/60))+':'+pad(sm%60);
    card.className='result-card '+(prev?'state-warn':'state-ok');
    eyebrow.textContent='Branchez la voiture à';
    timeEl.textContent=startStr;
  }

  const now=new Date();
  document.getElementById('end-time').value=pad(now.getHours())+':'+pad(now.getMinutes());
  update();

  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').style.display='flex';});
  document.getElementById('install-btn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').style.display='none';});
  window.addEventListener('appinstalled',()=>{document.getElementById('install-banner').style.display='none';});
  if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
</body>
</html>
